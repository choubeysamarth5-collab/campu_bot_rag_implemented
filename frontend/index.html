<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBot – Your College Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-theme="dark">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">

      <button class="mobile-menu-btn" id="mobileMenuBtn">
        ☰
      </button>

      <div class="bot-avatar">
        <span class="bot-icon">🎓</span>
        <span class="status-dot"></span>
      </div>

      <div class="bot-info">
        <h1 class="bot-name">CampusBot</h1>
        <span class="bot-status">
          Online · Always here to help
        </span>
      </div>

    </div>

    <div class="header-right">
      <!-- Language Selector — the only control that stays in the
           header on mobile. Theme/Profile/Admin move into the
           sidebar drawer below var(1024px) so the header never
           crowds or wraps. -->
      <div class="lang-dropdown">

        <button class="lang-current" id="langCurrentBtn">

          EN ⌄

        </button>

        <div class="lang-menu" id="langMenu">

          <button class="lang-btn active" data-lang="en">
            EN
          </button>

          <button class="lang-btn" data-lang="hi">
            हिन्दी
          </button>

          <button class="lang-btn" data-lang="mr">
            Marathi
          </button>

          <button class="lang-btn" data-lang="ta">
            தமிழ்
          </button>

          <button class="lang-btn" data-lang="te">
            తెలుగు
          </button>

        </div>

      </div>
      <!-- Theme Toggle -->
      <button class="theme-toggle header-only" id="themeToggle" title="Toggle theme">
        <span class="theme-icon">☀️</span>
      </button>

      <button class="profile-btn header-only" onclick="openProfileModal()" title="My Profile">

        👤

      </button>

      <!-- Admin Link (shows logout for regular users) -->
      <a href="admin.html" class="admin-link header-only" id="adminOrLogoutLink" title="Admin Panel">⚙️</a>
    </div>

  </header>

  <!-- Dark overlay behind the sidebar drawer on mobile — tapping
       anywhere on it (i.e. outside the sidebar) closes the drawer. -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="app-layout">

    <!-- SIDEBAR: Quick Topics -->
    <aside class="sidebar">

      <!-- New Chat -->
      <button class="sidebar-row sidebar-row-accent" onclick="window.createNewChat()">
        <span class="sidebar-row-icon">➕</span> New Chat
      </button>

      <!-- Chat History -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">Recent Chats</h3>
        <div id="historyList" class="sidebar-list history-list">
          <!-- Injected by JS -->
        </div>
        <button id="clearHistoryBtn" class="sidebar-row sidebar-row-muted">
          <span class="sidebar-row-icon">🗑</span> Clear History
        </button>
      </div>

      <!-- Quick Topics -->
      <div class="sidebar-section">
        <h3 class="sidebar-title">Quick Topics</h3>
        <div class="sidebar-list topic-list" id="topicList">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Spacer pushes everything below to the bottom, like Claude's
           pinned account/settings row -->
      <div class="sidebar-spacer"></div>

      <!-- Bottom pinned controls — shown here only on mobile (header
           already has these on desktop). Every row is the same flat,
           systematic list style: icon + label, full width, one line. -->
      <div class="sidebar-bottom">
        <button class="sidebar-row" onclick="openProfileModal()">
          <span class="sidebar-row-icon">👤</span> My Profile
        </button>
        <button class="sidebar-row" id="themeToggleMobile">
          <span class="sidebar-row-icon theme-icon">☀️</span> Toggle Theme
        </button>
        <a href="admin.html" class="sidebar-row" id="adminOrLogoutLinkMobile">
          <span class="sidebar-row-icon">⚙️</span> Admin Panel
        </a>
      </div>

      <!-- Contact / help footer -->
      <div class="sidebar-footer">
        <p>Need human help?</p>
        <a href="mailto:helpdesk@college.edu" class="contact-link">📧 helpdesk@college.edu</a>
        <a href="tel:+911234567890" class="contact-link">📞 +91 12345 67890</a>
      </div>
    </aside>

    <!-- CHAT AREA -->
    <main class="chat-area">

      <!-- Messages Container -->
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome message injected by JS -->
      </div>

      <!-- Suggestion Chips -->
      <div class="chips-row" id="chipsRow">
        <!-- Injected by JS -->
      </div>

      <!-- Input Bar -->
      <div class="input-bar">
        <input type="text" id="userInput" class="chat-input" placeholder="Ask me anything about your college…"
          autocomplete="off" />
        <button class="send-btn" id="sendBtn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

    </main>

  </div>

  <!-- ===== FEEDBACK MODAL ===== -->
  <div class="modal-overlay" id="feedbackModal" style="display:none">
    <div class="modal">
      <h3>Rate this answer</h3>
      <div class="stars" id="starRating">
        <span class="star" data-val="1">★</span>
        <span class="star" data-val="2">★</span>
        <span class="star" data-val="3">★</span>
        <span class="star" data-val="4">★</span>
        <span class="star" data-val="5">★</span>
      </div>
      <textarea id="feedbackText" placeholder="Any comments? (optional)"></textarea>
      <div class="modal-actions">
        <button class="btn-primary" id="submitFeedback">Submit</button>
        <button class="btn-ghost" id="closeFeedback">Skip</button>
      </div>
    </div>
  </div>

  <script src="auth/auth.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ── Sidebar drawer overlay (mobile) ─────────────────────────
    // app.js already toggles the .sidebar's "active" class from the
    // hamburger button — we don't touch that here to avoid double
    // toggling. We just: (1) keep the dark overlay in sync with the
    // sidebar's open/closed state automatically, and (2) close the
    // sidebar when the overlay itself is tapped (i.e. anywhere
    // outside the sidebar).
    const sidebarEl = document.querySelector('.sidebar');
    const sidebarOverlayEl = document.getElementById('sidebarOverlay');

    if (sidebarEl && sidebarOverlayEl) {
      const syncOverlay = () => {
        sidebarOverlayEl.classList.toggle('active', sidebarEl.classList.contains('active'));
      };
      new MutationObserver(syncOverlay).observe(sidebarEl, { attributes: true, attributeFilter: ['class'] });
      syncOverlay();

      sidebarOverlayEl.addEventListener('click', () => {
        sidebarEl.classList.remove('active');
      });
    }

    // ── Optional Login Support ─────────────────────
    // Chatbot works even without login

    const user = (typeof CampusAuth !== 'undefined')
      ? CampusAuth.getUser()
      : null;

    // ── If logged in ───────────────────────────────
    if (user) {

      // Show user name
      const statusEl = document.querySelector('.bot-status');

      if (statusEl) {
        statusEl.textContent = `👤 ${user.name} · Online`;
      }

      // Convert settings icon into logout button (header + sidebar clone)
      const logoutLink = document.getElementById('adminOrLogoutLink');
      const logoutLinkMobile = document.getElementById('adminOrLogoutLinkMobile');

      [logoutLink, logoutLinkMobile].forEach((el, i) => {
        if (!el) return;

        el.innerHTML = i === 0
          ? (window.innerWidth <= 768 ? '🚪' : '🚪 Logout')
          : '🚪 Logout';
        el.href = '#';
        el.title = 'Logout';

        el.addEventListener('click', (e) => {
          e.preventDefault();

          // Clear login session
          localStorage.clear();

          // Redirect to login page
          window.location.href = 'auth/login.html';
        });
      });

    } else {

      // If not logged in → show login button (header + sidebar clone)
      const loginLink = document.getElementById('adminOrLogoutLink');
      const loginLinkMobile = document.getElementById('adminOrLogoutLinkMobile');

      [loginLink, loginLinkMobile].forEach(el => {
        if (!el) return;
        el.innerHTML = '🔑 Login';
        el.href = 'auth/login.html';
        el.title = 'Login';
      });
    }

    // ── Theme toggle (shared by header + sidebar drawer buttons) ───
    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      document.querySelectorAll('.theme-icon').forEach(i => i.textContent = theme === 'dark' ? '☀️' : '🌙');
    }
    applyTheme(localStorage.getItem('theme') || 'dark');

    function toggleTheme() {
      const current = document.body.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }
    document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
    document.getElementById('themeToggleMobile')?.addEventListener('click', toggleTheme);

    // =============================================
    // PROFILE MODAL
    // =============================================


    async function openProfileModal() {

      document.getElementById(
        'profileModal'
      ).style.display = 'flex';

      try {

        const res =
          await CampusAuth.userFetch(
            '/auth/me'
          );

        const data =
          await res.json();

        const user =
          data.user;

        document.getElementById(
          'profileName'
        ).value =
          user.name || '';

        document.getElementById(
          'profileEmail'
        ).value =
          user.email || '';

        document.getElementById(
          'profileRoll'
        ).value =
          user.rollNumber || '';

        document.getElementById(
          'profileDepartment'
        ).value =
          user.department || '';

        document.getElementById(
          'profileYear'
        ).value =
          user.year || '';

      } catch (err) {

        console.error(err);
      }
    }

    function closeProfileModal() {

      document.getElementById(
        'profileModal'
      ).style.display = 'none';
    }

    async function updateProfile() {

      try {

        const body = {

          name:
            document.getElementById(
              'profileName'
            ).value,

          rollNumber:
            document.getElementById(
              'profileRoll'
            ).value,

          department:
            document.getElementById(
              'profileDepartment'
            ).value,

          year:
            document.getElementById(
              'profileYear'
            ).value
        };

        const res =
          await CampusAuth.userFetch(
            '/auth/profile',
            {

              method: 'PUT',

              headers: {
                'Content-Type':
                  'application/json'
              },

              body:
                JSON.stringify(body)
            }
          );

        const data =
          await res.json();

        alert(data.message);

      } catch (err) {

        console.error(err);

        alert('Update failed');
      }
    }
  </script>

  <!-- PROFILE MODAL -->
  <div class="modal-overlay" id="profileModal" style="display:none">

    <div class="modal">

      <h3>My Profile</h3>

      <input type="text" id="profileName" class="form-control" placeholder="Name">

      <br>

      <input type="email" id="profileEmail" class="form-control" placeholder="Email" readonly>

      <br>

      <input type="text" id="profileRoll" class="form-control" placeholder="Roll Number">

      <br>

      <input type="text" id="profileDepartment" class="form-control" placeholder="Department">

      <br>

      <input type="number" id="profileYear" class="form-control" placeholder="Year">

      <br>

      <div class="modal-actions">

        <button class="btn-primary" onclick="updateProfile()">

          Save

        </button>

        <button class="btn-ghost" onclick="closeProfileModal()">

          Close

        </button>

      </div>

    </div>
  </div>
</body>

</html>
